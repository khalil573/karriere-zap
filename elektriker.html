<style>
:root {
  --orange: #E24E1F;
  --orange-700: #C73E14;
  --orange-50: #FFF1EB;
  --ink: #0F1419;
  --ink-2: #1F2730;
  --ink-soft: #4A5560;
  --ink-mute: #7A828D;
  --paper: #FFFFFF;
  --paper-2: #FAFAF7;
  --paper-3: #F2F0EA;
  --border: #E8E5DD;
  --border-strong: #D5D0C3;
  --success: #1A7A3F;
  --danger: #B73B2E;
  --shadow-sm: 0 1px 2px rgba(15,20,25,0.06), 0 1px 1px rgba(15,20,25,0.04);
  --shadow-md: 0 4px 14px rgba(15,20,25,0.06), 0 1px 3px rgba(15,20,25,0.04);
  --shadow-lg: 0 24px 60px rgba(15,20,25,0.10), 0 8px 16px rgba(15,20,25,0.06);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 28px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--paper-2);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.display { font-family: 'Bricolage Grotesque', 'Manrope', sans-serif; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; }
.mono { font-family: 'JetBrains Mono', monospace; }

button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ====== Page container ====== */
.page {
  max-width: 560px;
  margin: 0 auto;
  background: var(--paper);
  min-height: 100vh;
  position: relative;
  box-shadow: 0 0 0 1px var(--border), 0 30px 80px rgba(15,20,25,0.05);
  overflow: hidden;
}
@media (min-width: 600px) {
  body { padding: 24px 16px 80px; }
  .page { border-radius: 24px; }
}

/* ====== Navbar ====== */
.nav {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: baseline; gap: 2px; }
.logo .mark {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  letter-spacing: -0.04em;
  font-size: 22px;
}
.logo .dot { color: var(--orange); font-weight: 800; font-size: 22px; }
.logo .sub { font-size: 11px; color: var(--ink-mute); font-weight: 600; letter-spacing: 0.04em; margin-left: 4px; text-transform: uppercase; }
.nav-cta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--ink);
  color: var(--paper);
  font-weight: 600;
  font-size: 13px;
  border: none;
  cursor: pointer;
  transition: transform 120ms ease, background 120ms ease;
}
.nav-cta:hover { background: var(--orange); transform: translateY(-1px); }
.nav-cta .arr { width: 14px; height: 14px; }

/* ====== Section base ====== */
section { padding: 56px 22px; position: relative; }
section.tight { padding: 36px 22px; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--orange);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.eyebrow::before {
  content: '';
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--orange);
}
.h1 { font-size: clamp(36px, 9vw, 52px); margin: 0; }
.h2 { font-size: clamp(28px, 6.6vw, 38px); margin: 0 0 16px 0; }
.h3 { font-size: 20px; margin: 0 0 8px 0; font-weight: 700; }
.lede { font-size: 17px; color: var(--ink-soft); margin: 14px 0 0 0; max-width: 480px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px 22px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  border: none;
  transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
  text-decoration: none;
}
.btn-primary { background: var(--orange); color: white; box-shadow: 0 8px 24px rgba(226,78,31,0.30), inset 0 -2px 0 rgba(0,0,0,0.12); }
.btn-primary:hover { background: var(--orange-700); transform: translateY(-2px); box-shadow: 0 14px 30px rgba(226,78,31,0.40), inset 0 -2px 0 rgba(0,0,0,0.12); }
.btn-ghost { background: transparent; color: var(--paper); border: 1.5px solid rgba(255,255,255,0.30); }
.btn-ghost:hover { background: rgba(255,255,255,0.08); }
.btn-block { width: 100%; }
.btn .arr { width: 18px; height: 18px; }

/* ====== Hero ====== */
.hero {
  background: var(--ink);
  color: var(--paper);
  padding: 36px 22px 44px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(80% 60% at 80% -10%, rgba(226,78,31,0.22), transparent 60%),
    radial-gradient(60% 40% at 0% 100%, rgba(255,255,255,0.04), transparent 60%);
  pointer-events: none;
}
.hero-inner { position: relative; z-index: 1; }
.hero .eyebrow { color: #FFB89E; }
.hero .eyebrow::before { background: #FFB89E; }
.hero h1.h1 { color: var(--paper); }
.hero h1 em { font-style: normal; color: #FF7A4A; }
.hero .lede { color: rgba(255,255,255,0.74); }
.hero .lede b { color: var(--paper); }

.hero-photo {
  margin-top: 24px;
  border-radius: var(--r-lg);
  overflow: hidden;
  position: relative;
  height: 260px;
  background:
    radial-gradient(70% 80% at 80% 20%, rgba(226,78,31,0.18), transparent 60%),
    linear-gradient(135deg, #1B232C 0%, #0B0F14 100%);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: flex-end; justify-content: flex-start;
  padding: 16px;
}
.hero-photo img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.hero-photo::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 16px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 16px);
}
.hero-photo .ph-label {
  position: relative;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.08em;
  background: rgba(15,20,25,0.6);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px dashed rgba(255,255,255,0.15);
}
.hero-tesla-mark {
  position: absolute;
  right: 16px; top: 16px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 64px;
  color: rgba(255,255,255,0.08);
  letter-spacing: -0.04em;
  line-height: 1;
}

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
  color: var(--paper);
  border: 1px solid rgba(255,255,255,0.10);
  white-space: nowrap;
}
.chip.solid { background: var(--orange); border-color: var(--orange); }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #FF7A4A; }
.chip.solid .dot { background: #fff; }

.hero-cta-stack { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
.hero-meta {
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  letter-spacing: 0.08em;
}

/* ====== Trust strip ====== */
.trust {
  background: var(--paper);
  padding: 28px 22px;
  border-bottom: 1px solid var(--border);
}
.trust-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
.trust-logos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.trust-logo {
  height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink-mute);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  letter-spacing: -0.02em;
  background: var(--paper-2);
}

/* ====== Benefits ====== */
.benefits { background: var(--paper); }
.benefit-list { display: flex; flex-direction: column; gap: 14px; margin-top: 24px; }
.benefit {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 16px;
  padding: 18px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-sm);
  transition: transform 160ms ease, box-shadow 160ms ease;
}
.benefit:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
.benefit-num {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 32px;
  line-height: 1;
  color: var(--orange);
  letter-spacing: -0.04em;
}
.benefit-num small { font-size: 14px; color: var(--ink-mute); display: block; margin-top: 4px; font-weight: 600; letter-spacing: 0.06em; }
.benefit h3 { margin: 0 0 4px 0; font-size: 18px; font-weight: 700; }
.benefit p { margin: 0; color: var(--ink-soft); font-size: 15px; line-height: 1.5; }

/* ====== Quote cards ====== */
.quotes { background: var(--paper-2); }
.quote-grid { display: flex; flex-direction: column; gap: 14px; margin-top: 24px; }
.quote-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 22px;
  position: relative;
}
.quote-card .qmark {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 56px;
  line-height: 0.6;
  color: var(--orange);
  font-weight: 800;
  margin-bottom: 4px;
  display: block;
}
.quote-card .qtext { font-size: 20px; line-height: 1.35; font-weight: 600; letter-spacing: -0.01em; }
.quote-card .qmeta { margin-top: 14px; display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--paper-3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink-mute);
  text-align: center;
  flex-shrink: 0;
  overflow: hidden;
  background-image:
    radial-gradient(circle at 50% 30%, rgba(226,78,31,0.10), transparent 60%);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.qname { font-weight: 700; font-size: 14px; }
.qrole { font-size: 13px; color: var(--ink-mute); }

/* ====== Igor mid-hook ====== */
.midhook {
  background: var(--ink);
  color: var(--paper);
  padding: 50px 22px;
  position: relative;
  overflow: hidden;
}
.midhook::after {
  content: '';
  position: absolute; right: -40px; top: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(226,78,31,0.18), transparent 60%);
}
.midhook .qmark { color: #FF7A4A; }
.midhook h2 { color: var(--paper); margin: 8px 0 18px 0; font-family: 'Bricolage Grotesque'; font-size: clamp(26px, 6vw, 36px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }
.midhook h2 em { font-style: normal; color: #FF7A4A; }
.midhook .qmeta .qname { color: var(--paper); }
.midhook .qmeta .qrole { color: rgba(255,255,255,0.6); }
.midhook .avatar { background-color: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); }
.midhook .preface { font-size: 14px; color: rgba(255,255,255,0.5); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; }

/* ====== Day timeline ====== */
.day { background: var(--paper); }
.timeline { margin-top: 24px; position: relative; padding-left: 26px; }
.timeline::before {
  content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px;
  width: 1.5px; background: var(--border-strong); border-radius: 2px;
}
.t-row { display: flex; flex-direction: column; padding: 10px 0; position: relative; }
.t-row::before {
  content: ''; position: absolute; left: -26px; top: 18px;
  width: 16px; height: 16px;
  border-radius: 50%; background: var(--paper);
  border: 2px solid var(--orange);
}
.t-row.fri::before { background: var(--orange); }
.t-time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--orange); font-weight: 600; letter-spacing: 0.06em; }
.t-text { font-size: 16px; margin-top: 2px; line-height: 1.4; }

/* ====== Compare table ====== */
.compare { background: var(--paper-2); }
.compare-table {
  margin-top: 22px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.compare-row {
  display: grid;
  grid-template-columns: 1.1fr 1fr 1.2fr;
  border-top: 1px solid var(--border);
}
.compare-row:first-child { border-top: none; }
.compare-row > div { padding: 16px 14px; font-size: 14px; }
.compare-row .label {
  font-weight: 700;
  color: var(--ink);
  background: var(--paper);
}
.compare-row .a {
  color: var(--ink-mute);
  background: var(--paper-3);
  text-decoration: line-through;
  text-decoration-color: rgba(0,0,0,0.25);
  display: flex; align-items: center; gap: 10px;
}
.compare-row .a::before {
  content: '✕';
  color: var(--danger);
  font-weight: 800;
  font-size: 14px;
  flex-shrink: 0;
  text-decoration: none;
  display: inline-block;
}
.compare-row .b {
  font-weight: 700;
  color: var(--paper);
  background: var(--orange);
  display: flex; align-items: center; gap: 10px;
  position: relative;
}
.compare-row .b::before {
  content: '✓';
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--paper);
  color: var(--orange);
  font-weight: 900;
  font-size: 13px;
  flex-shrink: 0;
  margin-right: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.10);
}
.compare-head { background: var(--ink) !important; color: var(--paper); }
.compare-head .label {
  background: transparent !important; color: rgba(255,255,255,0.55) !important;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.12em; text-transform: uppercase;
}
.compare-head .a, .compare-head .b {
  background: transparent !important;
  color: var(--paper) !important;
  font-family: 'Bricolage Grotesque';
  font-weight: 700;
  font-size: 15px;
  text-decoration: none !important;
  display: flex; align-items: center; gap: 8px;
}
.compare-head .a { color: rgba(255,255,255,0.55) !important; }
.compare-head .b { color: #FF9870 !important; }
.compare-head .a::before, .compare-head .b::before { display: none !important; }

/* ====== Fit filter ====== */
.fit { background: var(--paper); }
.fit-cards { display: flex; flex-direction: column; gap: 14px; margin-top: 22px; }
.fit-card {
  border-radius: var(--r-md);
  padding: 24px;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.fit-card.yes {
  background: #0E5C2F;
  color: #E8F5EC;
}
.fit-card.no {
  background: var(--ink);
  color: rgba(255,255,255,0.86);
}
.fit-card::after {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 160px; height: 160px;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.18;
}
.fit-card.yes::after { background: radial-gradient(circle, #4ED883, transparent 60%); }
.fit-card.no::after  { background: radial-gradient(circle, var(--orange), transparent 60%); }
.fit-card .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  position: relative;
}
.fit-card.yes .tag { color: #8EE7B0; }
.fit-card.no  .tag { color: #FF9870; }
.fit-card .title {
  font-family: 'Bricolage Grotesque';
  font-weight: 700;
  font-size: 24px;
  margin: 6px 0 18px 0;
  letter-spacing: -0.02em;
  color: var(--paper);
  position: relative;
}
.fit-card ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; position: relative; }
.fit-card li {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: 10px;
  align-items: start;
  font-size: 15px;
  line-height: 1.45;
  color: rgba(255,255,255,0.92);
}
.fit-card li::before {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  font-weight: 900;
  font-size: 12px;
  margin-top: 1px;
  flex-shrink: 0;
}
.fit-card.yes li::before {
  content: '✓';
  background: #4ED883;
  color: #0E5C2F;
  box-shadow: 0 2px 6px rgba(0,0,0,0.20);
}
.fit-card.no li::before {
  content: '✕';
  background: var(--orange);
  color: var(--paper);
  box-shadow: 0 2px 6px rgba(0,0,0,0.30);
}

/* ====== Calculator ====== */
.calc { background: linear-gradient(180deg, #FFF7F2 0%, #FFFFFF 100%); }
.calc-card {
  margin-top: 22px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-md);
}
.calc-q { font-size: 14px; color: var(--ink-soft); font-weight: 600; margin-bottom: 12px; }
.calc-q b { color: var(--ink); font-weight: 700; }
.slider {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--paper-3);
  margin: 8px 0 4px 0;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--orange);
  border: 3px solid var(--paper);
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(226,78,31,0.4);
}
.slider::-moz-range-thumb {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--orange);
  border: 3px solid var(--paper);
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(226,78,31,0.4);
}
.slider-meta { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.08em; }
.calc-grid { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.calc-tile {
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px;
  background: var(--paper-2);
}
.calc-tile .k { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.08em; text-transform: uppercase; }
.calc-tile .v { font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; margin-top: 2px; }
.calc-total {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  position: relative;
  overflow: hidden;
}
.calc-total::after {
  content: ''; position: absolute; right: -30px; top: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(226,78,31,0.30), transparent 60%);
}
.calc-total .k { color: rgba(255,255,255,0.6); }
.calc-total .v { font-size: 30px; color: var(--paper); }
.calc-note { margin-top: 12px; font-size: 12px; color: var(--ink-mute); font-style: italic; }

/* ====== Map ====== */
.map-sect { background: var(--paper); }
.map {
  margin-top: 22px;
  position: relative;
  border-radius: var(--r-lg);
  overflow: hidden;
  background: var(--paper-2);
  border: 1px solid var(--border);
  aspect-ratio: 4 / 5;
}
.map-bg {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(226,78,31,0.06), transparent 65%),
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(15,20,25,0.04) 22px 23px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(15,20,25,0.04) 22px 23px);
}
/* Germany states SVG map */
.de-map {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  padding: 6%;
  display: block;
  pointer-events: none;
}
.de-map svg { width: 100%; height: 100%; display: block; overflow: visible; filter: drop-shadow(0 2px 6px rgba(15,20,25,0.08)); }
.de-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  object-position: center;
  padding: 24px;
  box-sizing: border-box;
  filter: drop-shadow(0 4px 10px rgba(15,20,25,0.08));
}
.hq-pin-wrap {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: none;
}
.hq-pin-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #FFFFFF;
  border: 3px solid var(--ink);
  box-shadow: 0 0 0 4px rgba(15,20,25,0.12), 0 2px 4px rgba(15,20,25,0.25);
  flex: 0 0 auto;
}
.hq-pin-label {
  background: var(--ink);
  color: #FFFFFF;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 5px 9px;
  border-radius: 4px;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(15,20,25,0.18);
}
.de-base {
  fill: #CFCAB9;
  stroke: #B6B0A0;
  stroke-width: 0.6;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.de-active {
  fill: var(--orange);
  stroke: #FFFFFF;
  stroke-width: 0.8;
  stroke-linejoin: round;
}
.de-borders path {
  fill: none;
  stroke: rgba(255,255,255,0.55);
  stroke-width: 0.35;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.de-city {
  fill: #0F1419;
  stroke: #FFFFFF;
  stroke-width: 0.4;
}
.de-city-label text {
  fill: #6E6857;
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.6px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-anchor: start;
}
.hq-pin-outer {
  fill: var(--orange);
  stroke: #FFFFFF;
  stroke-width: 1.4;
}
.hq-pin-inner {
  fill: #FFFFFF;
}
.hq-pin-pulse {
  fill: var(--orange);
  opacity: 0.25;
  animation: hq-pulse 2.2s ease-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}
@keyframes hq-pulse {
  0%   { transform: scale(1);    opacity: 0.35; }
  100% { transform: scale(3.2);  opacity: 0; }
}
.map-pin {
  position: absolute;
  pointer-events: none;
}
.map-pin-label {
  position: absolute;
  transform: translate(14px, -50%);
  background: var(--ink); color: var(--paper);
  padding: 5px 10px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
}
.map-pin-label::before {
  content: ''; position: absolute; left: -4px; top: 50%;
  transform: translateY(-50%) rotate(45deg);
  width: 8px; height: 8px; background: var(--ink);
}
.map-legend {
  position: absolute; bottom: 14px; left: 14px;
  background: var(--paper); border: 1px solid var(--border);
  padding: 8px 12px; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-soft); letter-spacing: 0.06em;
}
.map-legend b { color: var(--orange); }
.region-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.region-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 11px;
  background: var(--orange);
  color: var(--paper);
  border-radius: 999px;
  letter-spacing: 0.04em;
}

/* ====== Team ====== */
.team { background: var(--paper-2); }
.team-grid {
  margin-top: 22px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.team-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px;
  text-align: center;
}
.team-photo {
  aspect-ratio: 1;
  border-radius: var(--r-sm);
  background:
    radial-gradient(circle at 50% 30%, rgba(226,78,31,0.10), transparent 60%),
    linear-gradient(160deg, var(--paper-3) 0%, var(--paper-2) 100%);
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}
.team-photo img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.team-photo.has-photo::before { display: none; }
.team-photo::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(15,20,25,0.025) 0 1px, transparent 1px 12px);
}
.team-photo .ph {
  position: absolute; bottom: 6px; left: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink-mute);
  background: var(--paper);
  padding: 3px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.team-name { font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
.team-role { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }

/* ====== Process ====== */
.process { background: var(--paper); }
.steps { margin-top: 24px; display: flex; flex-direction: column; gap: 14px; }
.step {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 16px;
  align-items: start;
}
.step-num {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bricolage Grotesque';
  font-size: 22px;
  font-weight: 700;
  position: relative;
}
.step:nth-child(1) .step-num { background: var(--orange); }
.step h3 { font-size: 18px; margin: 8px 0 4px 0; font-weight: 700; }
.step p { font-size: 15px; color: var(--ink-soft); margin: 0; }
.step .time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.08em; margin-top: 6px; }

/* ====== FAQ ====== */
.faq { background: var(--paper-2); }
.faq-list { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  transition: border-color 160ms ease, box-shadow 160ms ease;
}
.faq-item.open { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.faq-q {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px;
  background: transparent;
  border: none;
  cursor: pointer;
  text-align: left;
  font-weight: 600;
  font-size: 16px;
  color: var(--ink);
}
.faq-q .ic {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--ink-soft);
  flex-shrink: 0;
  transition: transform 200ms ease, background 200ms ease, color 200ms ease;
}
.faq-item.open .faq-q .ic { transform: rotate(45deg); background: var(--orange); color: white; border-color: var(--orange); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 240ms ease;
}
.faq-item.open .faq-a { max-height: 300px; }
.faq-a-inner { padding: 0 18px 18px 18px; color: var(--ink-soft); font-size: 15px; line-height: 1.55; }

/* ====== Form ====== */
.apply { background: var(--ink); color: var(--paper); position: relative; overflow: hidden; }
.apply::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(50% 50% at 80% 100%, rgba(226,78,31,0.18), transparent 60%);
}
.apply-inner { position: relative; }
.apply .eyebrow { color: #FFB89E; }
.apply .eyebrow::before { background: #FFB89E; }
.apply h2 { color: var(--paper); }
.apply h2 em { font-style: normal; color: #FF7A4A; }
.apply .lede { color: rgba(255,255,255,0.74); }

.ravn-card {
  margin-top: 28px;
  padding: 20px;
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 18px;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
  backdrop-filter: blur(4px);
}
.ravn-photo {
  width: 88px; height: 88px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  border: 2px solid rgba(255,255,255,0.18);
  display: block;
}
.ravn-body { display: flex; flex-direction: column; gap: 10px; }
.ravn-quote {
  color: rgba(255,255,255,0.92);
  font-size: 15px;
  line-height: 1.45;
  letter-spacing: -0.01em;
}
.ravn-meta {
  display: flex; flex-direction: column; gap: 2px;
}
.ravn-name {
  font-weight: 700;
  color: var(--paper);
  font-size: 14px;
  letter-spacing: -0.01em;
}
.ravn-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.04em;
}

/* Variant switcher */
.ravn-switch {
  display: inline-flex;
  margin-top: 22px;
  padding: 3px;
  gap: 2px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 999px;
}
.ravn-switch-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  background: transparent;
  border: none;
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: color .15s ease, background .15s ease;
}
.ravn-switch-btn.on {
  background: var(--paper);
  color: var(--ink);
}
.ravn-switch + .ravn-card,
.ravn-switch + .ravn-portrait { margin-top: 14px; }

/* Variant B — Portrait */
.ravn-portrait {
  margin-top: 14px;
  max-width: 380px;
}
.ravn-portrait-img {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 24px 48px -16px rgba(0,0,0,0.55), 0 8px 16px -8px rgba(0,0,0,0.4);
}
.ravn-portrait-img img {
  display: block;
  width: 100%;

/* ============= SALARY CALCULATOR ============= */
function Calc() {
  const [years, setYears] = useState(5);
  const base = useMemo(() => {
    const min = 3100,max = 4500;
    const v = Math.round(min + years / 15 * (max - min));
    return Math.round(v / 50) * 50;
  }, [years]);
  const tesla = 480;
  const total = base + tesla;
  const fmt = (n) => n.toLocaleString('de-DE');
  return (
    <section className="calc" id="calc">
      <div className="wrap">
        <div className="eyebrow">Gehaltsrechner</div>
        <h2 className="display h2">Was du <em style={{ fontStyle: 'normal', color: 'var(--orange)' }}>wirklich</em> in der Tasche hast.</h2>
        <p className="lede">Zieh den Regler auf deine Berufsjahre. Wir zeigen dir den Brutto-Lohn plus den geldwerten Vorteil deines Tesla.</p>
        <div className="calc-card">
          <div className="calc-card-grid">
            <div>
              <div className="calc-q">Deine Berufsjahre als Elektriker: <b>{years} Jahre</b></div>
              <input
                className="slider"
                type="range" min="0" max="15" step="1"
                value={years}
                onChange={(e) => setYears(parseInt(e.target.value))} />
              
              <div className="slider-meta"><span>0 J.</span><span>5 J.</span><span>10 J.</span><span>15+ J.</span></div>
              <div className="calc-note">* Beispielrechnung. Exakte Zahl im Erstgespräch — keine Pokerrunden.</div>
            </div>

            <div className="calc-grid">
              <div className="calc-tile">
                <div className="k">Brutto / Monat</div>
                <div className="v">{fmt(base)} €</div>
              </div>
              <div className="calc-tile">
                <div className="k">+ Tesla geldwerter Vorteil</div>
                <div className="v">~ {fmt(tesla)} €</div>
              </div>
              <div className="calc-tile calc-total">
                <div className="k">Dein Gesamtpaket</div>
                <div className="v">~ {fmt(total)} € / Monat</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>);

}

/* ============= APPLY FORM (Formspree) ============= */
const FORMSPREE_ENDPOINT = "https://formspree.io/f/xredbjjr";

function Apply() {
  const [ravnVariant, setRavnVariant] = useState('A');
  const [state, setState] = useState({
    name: '', phone: '', gesellenbrief: '', montage: '', fuehrerschein: '',
    callwhen: '', sent: false, loading: false, error: ''
  });
  const set = (k, v) => setState((s) => ({ ...s, [k]: v }));

  const valid = state.name && state.phone && state.gesellenbrief === 'ja' && state.fuehrerschein === 'ja' && state.montage;

  async function onSubmit(e) {
    e.preventDefault();
    if (!valid) return;
    set('loading', true);
    try {
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: state.name,
          telefon: state.phone,
          gesellenbrief: state.gesellenbrief,
          montage: state.montage,
          fuehrerschein: state.fuehrerschein,
          rueckruf: state.callwhen,
          _subject: `Neue Bewerbung Elektriker (ZAP): ${state.name}`
        })
      });
      if (!res.ok) throw new Error('Senden fehlgeschlagen. Bitte versuch es nochmal oder ruf uns an.');
      if (typeof fbq === 'function') { fbq('track', 'Lead'); }
      setState((s) => ({ ...s, sent: true, loading: false }));
    } catch (err) {
      setState((s) => ({ ...s, error: err.message || 'Senden fehlgeschlagen.', loading: false }));
    }
  }

  if (state.sent) {
    return (
      <section className="apply" id="apply">
        <div className="apply-inner wrap" style={{ display: 'block' }}>
          <div className="form-card form-success" style={{ maxWidth: 560, margin: '0 auto' }}>
            <div className="ic">✓</div>
            <h3 className="display" style={{ fontSize: 24, margin: '0 0 8px 0' }}>Bewerbung raus.</h3>
            <p style={{ color: 'var(--ink-soft)', margin: 0 }}>Ravn meldet sich bei dir innerhalb von 48 Stunden. Telefon klingelt.</p>
          </div>
        </div>
      </section>);

  }

  return (
    <section className="apply" id="apply">
      <div className="apply-inner wrap">
        <div className="apply-text">
          <div className="eyebrow">Bewerbung · 60 Sekunden</div>
          <h2 className="display h2">Klingt nach dir?<br /><em>Ravn ruft an.</em></h2>
          <p className="lede">Kein Lebenslauf, kein Anschreiben. Vier Felder, drei Knockout-Fragen — fertig.</p>
          <div className="ravn-switch" role="tablist" aria-label="Ravn Vorstellung Design wählen">
            <button type="button" className={`ravn-switch-btn ${ravnVariant === 'A' ? 'on' : ''}`} onClick={() => setRavnVariant('A')}>A · Kompakt</button>
            <button type="button" className={`ravn-switch-btn ${ravnVariant === 'B' ? 'on' : ''}`} onClick={() => setRavnVariant('B')}>B · Portrait</button>
          </div>
          {ravnVariant === 'A' ? (
            <div className="ravn-card">
              <img className="ravn-photo" src={window.__resources.ravnA} alt="Ravn P., Personalreferent" />
              <div className="ravn-body">
                <div className="ravn-quote">„Ich rufe dich persönlich zurück. 15 Minuten, ehrliche Antworten — du entscheidest danach, ob's passt."</div>
                <div className="ravn-meta">
                  <div className="ravn-name">Ravn P.</div>
                  <div className="ravn-role">Personalreferent · seit 2025 bei ZAP</div>
                </div>
              </div>
            </div>
          ) : (
            <div className="ravn-portrait">
              <div className="ravn-portrait-img">
                <img src={window.__resources.ravnB} alt="Ravn P., Personalreferent" />
                <div className="ravn-portrait-badge">
                  <span className="ravn-portrait-dot"></span>
                  Antwortet in &lt; 48 Std.
                </div>
              </div>
              <div className="ravn-portrait-cap">
                <div className="ravn-portrait-name">Ravn P.</div>
                <div className="ravn-portrait-role">„Ich rufe dich persönlich zurück. 15 Minuten, ehrliche Antworten — du entscheidest danach, ob's passt."

PERSONALREFERENT · SEIT 2025</div>
              </div>
            </div>
          )}
        </div>

        <form className="form-card" onSubmit={onSubmit} action={FORMSPREE_ENDPOINT} method="POST">

            <input type="text" name="name" placeholder="z.B. Max" value={state.name} onChange={(e) => set('name', e.target.value)} required />

          <div className="field">
            <label>Handynummer (für den Rückruf)</label>
            <input type="tel" name="phone" placeholder="z.B. 0151 …" value={state.phone} onChange={(e) => set('phone', e.target.value)} required />

          <div className="field">

            </div>

          <div className="field">
            <label>Bist du bereit, Mo–Do auf Montage zu sein?</label>

              </label>
            </div>
          </div>
          <div className="field">
            <label>Wann sollen wir anrufen? <span style={{ color: 'var(--ink-mute)', fontWeight: 400 }}>(optional)</span></label>
            <input type="text" name="callwhen" placeholder="z.B. Werktags ab 18 Uhr" value={state.callwhen} onChange={(e) => set('callwhen', e.target.value)} />

          <button className="btn btn-primary btn-block" type="submit" disabled={state.loading}>

          <div className="privacy">

      <button id="cookie-decline" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4);padding:14px 24px;border-radius:3px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;">Ablehnen</button>
      <button id="cookie-accept" style="background:#E24E1F;color:#fff;border:none;padding:14px 28px;border-radius:3px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">Akzeptieren</button>
    </div>
  </div>
</div>

<script>
(function() {
  var banner = document.getElementById('cookie-banner');
  var consent = localStorage.getItem('zap_cookie_consent');

  if (!consent) {
    banner.style.display = 'block';
  }

  document.getElementById('cookie-accept').onclick = function() {
    localStorage.setItem('zap_cookie_consent', 'accepted');
    banner.style.display = 'none';
    if (typeof fbq !== 'undefined') {
      fbq('consent', 'grant');
      fbq('track', 'PageView');
    }
  };

  document.getElementById('cookie-decline').onclick = function() {
    localStorage.setItem('zap_cookie_consent', 'declined');
    banner.style.display = 'none';
  };
})();
</script>

</body></html>
